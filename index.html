<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>步步为营</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui;
            background: #e6d8bd;
            display: flex;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }

        #title {
            font-size: 22px;
            font-weight: 700
        }

        #themeWrap {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600
        }

        #themeSelect {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, .2);
            background: #fff;
            font-size: 14px;
        }

        #themeSelect:disabled {
            opacity: .45;
            cursor: not-allowed;
        }

        #info {
            display: flex;
            gap: 16px;
            font-weight: 600;
            font-size: 14px
        }

        #game {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center
        }

        #board {
            width: 95vw;
            max-width: 560px;
            aspect-ratio: 1;
            display: grid;

            grid-template-columns:
                1fr 0.18fr 1fr 0.18fr 1fr 0.18fr 1fr 0.18fr 1fr
                0.18fr 1fr 0.18fr 1fr 0.18fr 1fr 0.18fr 1fr;

            grid-template-rows:
                1fr 0.18fr 1fr 0.18fr 1fr 0.18fr 1fr 0.18fr 1fr
                0.18fr 1fr 0.18fr 1fr 0.18fr 1fr 0.18fr 1fr;

            background: #6b4f2a;
            padding: 6px;
            border-radius: 14px;
        }

        .edge-h,
        .edge-v,
        .intersection {
            position: relative
        }

        .cell {
            background: #f6f1e7;
            border-radius: 6px;
            position: relative
        }

        .edge-h::before,
        .edge-v::before {
            content: "";
            position: absolute;
            background: rgba(0, 0, 0, .15);
        }

        .edge-h::before {
            width: 100%;
            height: 8%;
            top: 46%;
            border-radius: 6px;
        }

        .edge-v::before {
            height: 100%;
            width: 8%;
            left: 46%;
            border-radius: 6px;
        }

        .intersection {
            pointer-events: none
        }

        .p1,
        .p2,
        .preview-piece {
            position: absolute;
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            border-radius: 50%;
        }

        .p1 {
            background: #42a5f5
        }

        .p2 {
            background: #ef5350
        }

        .preview-piece {
            opacity: .4
        }

        /* ===== 墙连续渲染 ===== */

        .wall {
            position: absolute;
            inset: 0;
        }

        .edge-h .wall.start {
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        .edge-h .wall.middle {
            border-radius: 0;
            margin-left: -1px;
            margin-right: -1px;
        }

        .edge-h .wall.end {
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .edge-v .wall.start {
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .edge-v .wall.middle {
            border-radius: 0;
            margin-top: -1px;
            margin-bottom: -1px;
        }

        .edge-v .wall.end {
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .wall.blue {
            background: #1e88e5
        }

        .wall.red {
            background: #c62828
        }

        .wall.preview {
            opacity: .4
        }

        .highlight {
            background: #cdeffd !important;
        }

        /* ===== 皮肤：如何回蚁窝 ===== */
        [data-theme="ant"] #board {
            background: #8b6b4d;
            background-image:
                radial-gradient(ellipse at 28% 18%, rgba(90, 54, 28, .28) 0%, rgba(90, 54, 28, .16) 14%, transparent 25%),
                repeating-linear-gradient(90deg,
                    transparent 0px,
                    transparent 8px,
                    rgba(0, 0, 0, 0.05) 8px,
                    rgba(0, 0, 0, 0.05) 10px),
                repeating-linear-gradient(0deg,
                    transparent 0px,
                    transparent 20px,
                    rgba(0, 0, 0, 0.08) 20px,
                    rgba(0, 0, 0, 0.08) 22px);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
        }

        [data-theme="ant"] .cell {
            background: rgba(246, 221, 171, .52);
            box-shadow: inset 0 0 5px rgba(70, 44, 23, .18);
        }

        [data-theme="ant"] .edge-h::before,
        [data-theme="ant"] .edge-v::before {
            background: rgba(45, 28, 14, .28);
        }

        [data-theme="ant"] .p1,
        [data-theme="ant"] .p2 {
            --ant-color: #c0392b;
            --ant-dark: #6e1d14;
            background:
                radial-gradient(circle at 19% 44%, #111 0 4%, transparent 5%),
                radial-gradient(circle at 19% 56%, #111 0 4%, transparent 5%),
                radial-gradient(circle at 25% 50%, var(--ant-color) 0 15%, transparent 16%),
                radial-gradient(ellipse at 51% 50%, var(--ant-color) 0 19%, transparent 20%),
                radial-gradient(ellipse at 76% 50%, var(--ant-color) 0 22%, transparent 23%);
            border-radius: 0;
            overflow: visible;
            z-index: 5;
            filter: drop-shadow(0 2px 1px rgba(0, 0, 0, .28));
        }

        [data-theme="ant"] .p2 {
            --ant-color: #f1c40f;
            --ant-dark: #9f7600;
        }

        [data-theme="ant"] .ant-left {
            transform: rotate(0deg)
        }

        [data-theme="ant"] .ant-right {
            transform: rotate(180deg)
        }

        [data-theme="ant"] .ant-up {
            transform: rotate(90deg)
        }

        [data-theme="ant"] .ant-down {
            transform: rotate(-90deg)
        }

        [data-theme="ant"] .p1::before,
        [data-theme="ant"] .p2::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(28deg, transparent 45%, var(--ant-dark) 47%, var(--ant-dark) 53%, transparent 55%) 9% 19%/24% 16% no-repeat,
                linear-gradient(-28deg, transparent 45%, var(--ant-dark) 47%, var(--ant-dark) 53%, transparent 55%) 9% 65%/24% 16% no-repeat,
                linear-gradient(58deg, transparent 46%, var(--ant-dark) 48%, var(--ant-dark) 52%, transparent 54%) 35% 9%/32% 22% no-repeat,
                linear-gradient(-58deg, transparent 46%, var(--ant-dark) 48%, var(--ant-dark) 52%, transparent 54%) 35% 69%/32% 22% no-repeat,
                linear-gradient(35deg, transparent 46%, var(--ant-dark) 48%, var(--ant-dark) 52%, transparent 54%) 60% 14%/34% 20% no-repeat,
                linear-gradient(-35deg, transparent 46%, var(--ant-dark) 48%, var(--ant-dark) 52%, transparent 54%) 60% 66%/34% 20% no-repeat;
            z-index: -1;
        }

        [data-theme="ant"] .p1::after,
        [data-theme="ant"] .p2::after {
            content: "";
            position: absolute;
            width: 26%;
            height: 26%;
            left: 1%;
            top: 23%;
            border-top: 2px solid var(--ant-dark);
            border-left: 2px solid transparent;
            border-radius: 50%;
            transform: rotate(-20deg);
            box-shadow: 4px 16px 0 -1px var(--ant-dark);
        }

        /* --- 蚁窝皮肤 · 墙（无缝平滑版） --- */

        /* 基础尺寸：让墙段覆盖单元格并略微延伸以消除间隙 */
        [data-theme="ant"] .edge-h .wall {
            inset: 18% -2px 18% -2px;
        }
        [data-theme="ant"] .edge-v .wall {
            inset: -2px 18% -2px 18%;
        }

        /* 移除所有边框和轮廓，避免接缝处出现方形线条 */
        [data-theme="ant"] .wall.blue,
        [data-theme="ant"] .wall.red {
            outline: none !important;
            border: none !important;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .35); /* 仅保留整体阴影，由父容器或统一阴影实现 */
            filter: blur(.15px);
            mix-blend-mode: normal;
            background: none; /* 背景由下面单独定义 */
        }

        /* 墙的颜色及纹理（连续渐变，三段拼接无痕） */
        [data-theme="ant"] .wall.blue {
            background:
                repeating-linear-gradient(135deg, rgba(255, 255, 255, .28) 0 3px, transparent 3px 8px),
                linear-gradient(135deg, #ff1744 0%, #ff5252 38%, #ff0033 64%, #ff6b81 100%);
            /* 注意：三段背景独立，但颜色一致且延伸，拼接处由于重叠不会出现接缝 */
        }

        [data-theme="ant"] .wall.red {
            background:
                repeating-linear-gradient(135deg, rgba(255, 255, 255, .38) 0 3px, transparent 3px 8px),
                linear-gradient(135deg, #fff176 0%, #ffeb3b 36%, #ffc400 66%, #fff59d 100%);
        }

        /* 圆角控制：仅两端圆角，中间段无圆角，保证整体圆角矩形 */
        [data-theme="ant"] .edge-h .wall.start {
            border-top-left-radius: 5px;
            border-bottom-left-radius: 5px;
        }
        [data-theme="ant"] .edge-h .wall.end {
            border-top-right-radius: 5px;
            border-bottom-right-radius: 5px;
        }
        [data-theme="ant"] .edge-h .wall.middle {
            border-radius: 0;
        }

        [data-theme="ant"] .edge-v .wall.start {
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }
        [data-theme="ant"] .edge-v .wall.end {
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
        }
        [data-theme="ant"] .edge-v .wall.middle {
            border-radius: 0;
        }

        /* 预览墙同样处理 */
        [data-theme="ant"] .wall.preview {
            opacity: .62;
        }

        #side {
            width: 95vw;
            max-width: 560px;
            display: flex;
            gap: 8px;
        }

        #side button {
            flex: 1;
            padding: 12px 0;
            border-radius: 10px;
            border: none;
            font-size: 14px;
        }

        #confirmBtn {
            background: #333;
            color: #fff;
            opacity: .3
        }

        #confirmBtn.enabled {
            opacity: 1
        }
    </style>

    <style>
        html,
        body {
            touch-action: manipulation;
        }
    </style>

</head>
<body data-theme="classic">

    <div id="app">
        <div id="title">步步为营</div>
        <div id="themeWrap">
            <label for="themeSelect">皮肤：</label>
            <select id="themeSelect">
                <option value="classic">经典版</option>
                <option value="ant">如何回蚁窝</option>
            </select>
        </div>
        <div id="info">
            <div id="turn"></div>
            <div id="wallsInfo"></div>
        </div>

        <div id="game">
            <div id="board"></div>
            <div id="side">
                <button id="confirmBtn">确认</button>
                <button onclick="undo()">悔棋</button>
                <button onclick="redo()">撤销悔棋</button>
                <button onclick="resetGame()">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        const boardEl = document.getElementById("board");
        const confirmBtn = document.getElementById("confirmBtn");
        const turnEl = document.getElementById("turn");
        const wallsEl = document.getElementById("wallsInfo");
        const themeSelect = document.getElementById("themeSelect");

        let currentPlayer = 1;
        let players = { 1: { x: 4, y: 8 }, 2: { x: 4, y: 0 } };
        let walls = { h: new Map(), v: new Map() };
        let wallsLeft = { 1: 10, 2: 10 };
        const past = [],
            future = [];
        let gameOver = false;
        let gameStarted = false;
        let antDirections = { 1: "up", 2: "down" };

        let previewMove = null,
            previewWall = null;
        let legalMoves = [],
            legalWalls = new Set();

        function updateThemeControl() {
            gameStarted = past.length > 0;
            if (themeSelect) {
                themeSelect.disabled = gameStarted;
            }
        }

        function getMoveDirection(from, to, pid = currentPlayer) {
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            if (dx !== 0 && Math.abs(dx) >= Math.abs(dy)) {
                return dx < 0 ? "left" : "right";
            }
            if (dy !== 0) {
                return dy < 0 ? "up" : "down";
            }
            return antDirections[pid] || (pid === 1 ? "up" : "down");
        }

        function isOccupied(x, y) {
            const o = players[3 - currentPlayer];
            return o.x === x && o.y === y;
        }

        function autoShowMoves() {
            clearHighlights();
            legalMoves = [];
            const me = players[currentPlayer];
            const opp = players[3 - currentPlayer];
            const dirs = [
                [0, 1],
                [0, -1],
                [1, 0],
                [-1, 0]
            ];

            dirs.forEach(([dx, dy]) => {
                const nx = me.x + dx,
                    ny = me.y + dy;
                if (nx < 0 || ny < 0 || nx > 8 || ny > 8) return;
                if (blocked(me.x, me.y, nx, ny)) return;

                if (nx === opp.x && ny === opp.y) {
                    const bx = opp.x + dx,
                        by = opp.y + dy;
                    const canJump =
                        bx >= 0 && by >= 0 && bx <= 8 && by <= 8 &&
                        !blocked(opp.x, opp.y, bx, by);

                    if (canJump) {
                        addMove(bx, by);
                    } else {
                        const sides = dx === 0 ? [
                            [1, 0],
                            [-1, 0]
                        ] : [
                            [0, 1],
                            [0, -1]
                        ];
                        sides.forEach(([sx, sy]) => {
                            const tx = opp.x + sx,
                                ty = opp.y + sy;
                            if (tx < 0 || ty < 0 || tx > 8 || ty > 8) return;
                            if (blocked(opp.x, opp.y, tx, ty)) return;
                            addMove(tx, ty);
                        });
                    }
                } else if (!isOccupied(nx, ny)) {
                    addMove(nx, ny);
                }
            });
        }

        function addMove(x, y) {
            legalMoves.push({ x, y });
            boardEl.children[(y * 2) * 17 + (x * 2)]
                .classList.add("highlight");
        }

        function clearHighlights() {
            boardEl.querySelectorAll(".highlight")
                .forEach(e => e.classList.remove("highlight"));
        }

        function setConfirm(e) {
            confirmBtn.classList.toggle("enabled", e);
        }

        confirmBtn.onclick = () => {
            if (gameOver) return;
            if (previewMove) placeMove();
            if (previewWall) placeWall();
        };

        function makeSnapshot() {
            return {
                currentPlayer,
                players: JSON.parse(JSON.stringify(players)),
                walls: { h: new Map(walls.h), v: new Map(walls.v) },
                wallsLeft: JSON.parse(JSON.stringify(wallsLeft)),
                antDirections: JSON.parse(JSON.stringify(antDirections))
            };
        }

        function applySnapshot(s) {
            currentPlayer = s.currentPlayer;
            players = JSON.parse(JSON.stringify(s.players));
            walls = { h: new Map(s.walls.h), v: new Map(s.walls.v) };
            wallsLeft = JSON.parse(JSON.stringify(s.wallsLeft));
            antDirections = JSON.parse(JSON.stringify(s.antDirections || { 1: "up", 2: "down" }));
        }

        function commit() {
            past.push(makeSnapshot());
            future.length = 0;
            gameStarted = true;
            updateThemeControl();
        }

        function undo() {
            if (gameOver) return;
            if (!past.length) return;
            future.push(makeSnapshot());
            applySnapshot(past.pop());
            clearPreview();
            render();
        }

        function redo() {
            if (gameOver) return;
            if (!future.length) return;
            past.push(makeSnapshot());
            applySnapshot(future.pop());
            clearPreview();
            render();
        }

        function cellClick(x, y) {
            if (gameOver) return;
            if (!legalMoves.some(m => m.x === x && m.y === y)) {
                setConfirm(false);
                return;
            }

            clearPreview(false);
            previewMove = { x, y };

            const i = (y * 2) * 17 + (x * 2);
            const p = document.createElement("div");
            p.className = "preview-piece " + (currentPlayer === 1 ? "p1" : "p2") + " ant-" + getMoveDirection(players[
                currentPlayer], previewMove);
            boardEl.children[i].appendChild(p);

            setConfirm(true);
        }

        function computeLegalWalls() {
            legalWalls.clear();
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    if (canPlaceWall(x, y, true))
                        legalWalls.add(`${x},${y},h`);
                    if (canPlaceWall(x, y, false))
                        legalWalls.add(`${x},${y},v`);
                }
            }
        }

        function wallClick(gx, gy, h) {
            if (gameOver) return;
            clearPreview(false);

            const x = Math.floor((gx - 1) / 2);
            const y = Math.floor((gy - 1) / 2);
            const key = `${x},${y},${h?'h':'v'}`;

            if (!legalWalls.has(key)) {
                setConfirm(false);
                return;
            }

            previewWall = { gx, gy, h };
            drawPreviewWall(gx, gy, h);
            setConfirm(true);
        }

        function placeMove() {
            if (gameOver) return;
            if (!previewMove) return;

            commit();
            antDirections[currentPlayer] = getMoveDirection(players[currentPlayer], previewMove);
            players[currentPlayer] = previewMove;

            clearPreview();
            render();

            if (currentPlayer === 1 && players[currentPlayer].y === 0) {
                gameOver = true;
                clearPreview();
                clearHighlights();
                render();
                showWin(1);
                return;
            }
            if (currentPlayer === 2 && players[currentPlayer].y === 8) {
                gameOver = true;
                clearPreview();
                clearHighlights();
                render();
                showWin(2);
                return;
            }

            currentPlayer = 3 - currentPlayer;
            render();
        }

        function placeWall() {
            if (gameOver) return;
            if (!previewWall) return;

            const x = Math.floor((previewWall.gx - 1) / 2);
            const y = Math.floor((previewWall.gy - 1) / 2);
            const key = `${x},${y},${previewWall.h?'h':'v'}`;

            if (!legalWalls.has(key)) return;

            commit();
            (previewWall.h ? walls.h : walls.v).set(x + "," + y, currentPlayer);
            wallsLeft[currentPlayer]--;

            currentPlayer = 3 - currentPlayer;
            clearPreview();
            render();
        }

        function clearPreview(reset = true) {
            boardEl.querySelectorAll(".preview,.preview-piece")
                .forEach(e => e.remove());
            previewMove = null;
            previewWall = null;
            if (reset) setConfirm(false);
        }

        function canPlaceWall(x, y, h) {
            if (x < 0 || y < 0 || x >= 8 || y >= 8) return false;
            if (wallsLeft[currentPlayer] <= 0) return false;

            const key = x + "," + y;

            if (h) {
                if (walls.h.has(key)) return false;
                if (walls.h.has((x - 1) + "," + y)) return false;
                if (walls.h.has((x + 1) + "," + y)) return false;
                if (walls.v.has(key)) return false;
            } else {
                if (walls.v.has(key)) return false;
                if (walls.v.has(x + "," + (y - 1))) return false;
                if (walls.v.has(x + "," + (y + 1))) return false;
                if (walls.h.has(key)) return false;
            }

            const bh = new Map(walls.h);
            const bv = new Map(walls.v);

            (h ? walls.h : walls.v).set(key, 1);

            const ok = hasPath(1) && hasPath(2);

            walls.h = bh;
            walls.v = bv;

            return ok;
        }

        function hasPath(pid) {
            const start = players[pid];
            const goalY = pid === 1 ? 0 : 8;

            const q = [
                [start.x, start.y]
            ];
            const vis = new Set([start.x + "," + start.y]);

            while (q.length) {
                const [x, y] = q.shift();
                if (y === goalY) return true;

                [
                    [0, 1],
                    [0, -1],
                    [1, 0],
                    [-1, 0]
                ].forEach(([dx, dy]) => {
                    const nx = x + dx,
                        ny = y + dy;
                    if (nx < 0 || ny < 0 || nx > 8 || ny > 8) return;
                    if (blocked(x, y, nx, ny)) return;

                    const k = nx + "," + ny;
                    if (vis.has(k)) return;

                    vis.add(k);
                    q.push([nx, ny]);
                });
            }
            return false;
        }

        function blocked(x1, y1, x2, y2) {
            if (x1 === x2) {
                const y = Math.min(y1, y2);
                return walls.h.has(x1 + "," + y) ||
                    walls.h.has((x1 - 1) + "," + y);
            }
            if (y1 === y2) {
                const x = Math.min(x1, x2);
                return walls.v.has(x + "," + y1) ||
                    walls.v.has(x + "," + (y1 - 1));
            }
            return false;
        }

        function drawPreviewWall(gx, gy, h) {
            const x = Math.floor((gx - 1) / 2);
            const y = Math.floor((gy - 1) / 2);
            const color = currentPlayer === 1 ? "blue" : "red";

            const cells = h ?
                [(y * 2 + 1) * 17 + (x * 2),
                    (y * 2 + 1) * 17 + (x * 2 + 1),
                    (y * 2 + 1) * 17 + (x * 2 + 2)
                ] :
                [(y * 2) * 17 + (x * 2 + 1),
                    (y * 2 + 1) * 17 + (x * 2 + 1),
                    (y * 2 + 2) * 17 + (x * 2 + 1)
                ];

            cells.forEach((i, idx) => {
                const w = document.createElement("div");
                w.className = `wall preview ${color} ${
              idx===0?'start':
              idx===1?'middle':
              'end'
            }`;
                boardEl.children[i].appendChild(w);
            });
        }

        function drawWall(key, h, p) {
            const [x, y] = key.split(",").map(Number);
            const color = p === 1 ? "blue" : "red";

            const cells = h ?
                [(y * 2 + 1) * 17 + (x * 2),
                    (y * 2 + 1) * 17 + (x * 2 + 1),
                    (y * 2 + 1) * 17 + (x * 2 + 2)
                ] :
                [(y * 2) * 17 + (x * 2 + 1),
                    (y * 2 + 1) * 17 + (x * 2 + 1),
                    (y * 2 + 2) * 17 + (x * 2 + 1)
                ];

            cells.forEach((i, idx) => {
                const w = document.createElement("div");
                w.className = `wall ${color} ${
              idx===0?'start':
              idx===1?'middle':
              'end'
            }`;
                boardEl.children[i].appendChild(w);
            });
        }

        function render() {
            updateThemeControl();
            boardEl.querySelectorAll(".p1,.p2,.wall")
                .forEach(e => e.remove());

            [1, 2].forEach(p => {
                const i = (players[p].y * 2) * 17 + (players[p].x * 2);
                const d = document.createElement("div");
                d.className = (p === 1 ? "p1" : "p2") + " ant-" + (antDirections[p] || (p === 1 ? "up" : "down"));
                boardEl.children[i].appendChild(d);
            });

            walls.h.forEach((p, key) => drawWall(key, true, p));
            walls.v.forEach((p, key) => drawWall(key, false, p));

            const theme = document.body.dataset.theme || "classic";
            if (theme === "ant") {
                turnEl.textContent = currentPlayer === 1 ?
                    "🔴 血红林蚁回合" :
                    "🟡 大阪举腹蚁回合";
                wallsEl.textContent = `墙：红蚁 ${wallsLeft[1]} | 黄蚁 ${wallsLeft[2]}`;
            } else {
                turnEl.textContent = currentPlayer === 1 ?
                    "🔵 蓝方回合" :
                    "🔴 红方回合";
                wallsEl.textContent = `墙：蓝 ${wallsLeft[1]} | 红 ${wallsLeft[2]}`;
            }

            if (!gameOver) {
                computeLegalWalls();
                autoShowMoves();
            }
        }

        function init() {
            for (let y = 0; y < 17; y++) {
                for (let x = 0; x < 17; x++) {
                    const d = document.createElement("div");

                    if (x % 2 === 0 && y % 2 === 0) {
                        d.className = "cell";
                        d.onclick = () => cellClick(x / 2, y / 2);
                    } else if (x % 2 === 1 && y % 2 === 1) {
                        d.className = "intersection";
                    } else if (y % 2 === 0) {
                        d.className = "edge-v";
                        d.onclick = () => wallClick(x, y, false);
                    } else {
                        d.className = "edge-h";
                        d.onclick = () => wallClick(x, y, true);
                    }

                    boardEl.appendChild(d);
                }
            }

            document.body.dataset.theme = document.body.dataset.theme || "classic";
            themeSelect.value = document.body.dataset.theme;
            themeSelect.onchange = () => {
                if (gameStarted || past.length > 0) {
                    themeSelect.value = document.body.dataset.theme || "classic";
                    alert("游戏开始后不能切换皮肤，请重新开始后再切换。");
                    return;
                }
                document.body.dataset.theme = themeSelect.value;
                render();
            };

            render();
        }

        init();
    </script>

    <div id="winMask">
        <div id="winPanel">
            <div id="closeWin">✕</div>
            <div id="winText"></div>
            <button onclick="resetGame()">重新开始</button>
        </div>
    </div>

    <style>
        #winMask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #winPanel {
            position: relative;
            background: #fff;
            padding: 28px 32px 24px 32px;
            border-radius: 14px;
            text-align: center;
            min-width: 220px;
        }

        #closeWin {
            position: absolute;
            top: 8px;
            right: 12px;
            cursor: pointer;
            font-size: 18px;
        }

        #winPanel button {
            margin-top: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
        }
    </style>

    <script>
        function resetGame() {
            currentPlayer = 1;
            players = { 1: { x: 4, y: 8 }, 2: { x: 4, y: 0 } };
            walls = { h: new Map(), v: new Map() };
            wallsLeft = { 1: 10, 2: 10 };
            antDirections = { 1: "up", 2: "down" };
            past.length = 0;
            future.length = 0;
            previewMove = null;
            previewWall = null;
            legalMoves = [];
            legalWalls = new Set();
            gameOver = false;
            gameStarted = false;
            document.getElementById("winMask").style.display = "none";
            clearPreview();
            clearHighlights();
            render();
        }

        function showWin(p) {
            document.getElementById("winText").textContent =
                p === 1 ? "🔵 蓝方胜利！" : "🔴 红方胜利！";
            document.getElementById("winMask").style.display = "flex";
        }

        document.addEventListener("click", function(e) {
            if (e.target.id === "closeWin") {
                document.getElementById("winMask").style.display = "none";
            }
        });
    </script>

</body>
</html>
